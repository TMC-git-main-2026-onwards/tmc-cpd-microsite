[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # SUPABASE_SERVICE_ROLE_KEY is used server-side (SSR dashboard) to sign URLs for
  # the private course-videos bucket. It is intentionally present in the server
  # function bundle, so exclude it from Netlify's secrets scanner to avoid a false
  # positive that would fail the build. It is never exposed to the client.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_SERVICE_ROLE_KEY"
